<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Object Detection</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar glass">
      <div>
        <p class="kicker">Agentic Object Detection System</p>
        <h1>Live Vision Console</h1>
      </div>
      <p class="sub">Upload images or run realtime camera inference in-browser.</p>
    </header>

    <section class="action-ribbon glass">
      <div class="upload-group">
        <label for="fileInput" class="upload-label">Select image</label>
        <input id="fileInput" type="file" accept="image/*">
      </div>

      <div class="button-group">
        <button id="detectBtn" type="button" disabled>Run Detection</button>
        <button id="startLiveBtn" type="button">Start Live Camera</button>
        <button id="stopLiveBtn" type="button" class="ghost" disabled>Stop Live</button>
        <button id="clearBtn" type="button" class="ghost">Clear</button>
      </div>

      <p id="statusText" class="status">Waiting for image or camera...</p>
    </section>

    <section class="grid-layout">
      <article class="viewer-panel glass">
        <div class="viewer-head">
          <h2>Detection View</h2>
          <span id="modeText" class="mode-pill">Idle</span>
        </div>
        <div class="canvas-wrap">
          <video id="liveVideo" class="live-video" autoplay playsinline muted></video>
          <canvas id="previewCanvas"></canvas>
        </div>
      </article>

      <aside class="insight-panel glass">
        <h2>Telemetry</h2>
        <div id="summary" class="summary-grid">
          <div class="metric-card">
            <span>Detections</span>
            <strong id="detCount">0</strong>
          </div>
          <div class="metric-card">
            <span>Latency</span>
            <strong id="latency">-</strong>
          </div>
        </div>

        <h3>Detections</h3>
        <ul id="detectionList" class="detection-list"></ul>

        <h3>Raw Response</h3>
        <pre id="rawResponse" class="raw"></pre>
      </aside>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
